<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>Trading AI</title>

<style>

/* ===== BASE ===== */
* { box-sizing: border-box; }

html, body {
  margin:0;
  height:100%;
  overflow:hidden;
  background:#0b0b0c;
  font-family:-apple-system, BlinkMacSystemFont;
}

/* ===== APP ===== */
.app {
  height:100dvh;
  display:flex;
  flex-direction:column;
  padding-top:env(safe-area-inset-top);
  padding-bottom:env(safe-area-inset-bottom);
}

/* ===== HEADER ===== */
header {
  text-align:center;
  padding:14px;
  font-weight:600;
  font-size:17px;
  backdrop-filter: blur(10px);
  border-bottom:1px solid rgba(255,255,255,0.05);
}

/* ===== TABS ===== */
.tabs {
  display:flex;
  position:relative;
}

.tab {
  flex:1;
  text-align:center;
  padding:12px;
  color:#888;
}

.tab.active {
  color:#1db954;
}

.indicator {
  position:absolute;
  bottom:0;
  height:2px;
  width:50%;
  background:#1db954;
  transition:0.25s;
}

/* ===== SECTIONS ===== */
.wrapper {
  flex:1;
  display:flex;
  width:200%;
  transition:0.3s ease;
}

.section {
  width:100%;
  flex-shrink:0;
  display:flex;
  flex-direction:column;
}

/* ===================== */
/* ===== TRADE ===== */
/* ===================== */

.trade-box {
  padding:16px;
}

.trade-input {
  width:100%;
  padding:16px;
  font-size:16px;
  border-radius:14px;
  border:none;
  background:#1c1c1e;
  color:white;
  margin-bottom:12px;
}

.btn {
  width:100%;
  padding:16px;
  font-size:17px;
  border:none;
  border-radius:14px;
  margin:8px 0;
  font-weight:600;
  transition:0.15s;
}

.btn:active {
  transform:scale(0.96);
}

.buy { background:#1db954; color:black; }
.sell { background:#ff3b30; }
.cmd { background:#2c2c2e; }

/* ===================== */
/* ===== CHAT ===== */
/* ===================== */

.chat-container {
  display:flex;
  flex-direction:column;
  height:100%;
}

.chat-box {
  flex:1;
  overflow-y:auto;
  padding:10px;
  -webkit-overflow-scrolling:touch;
}

.msg {
  max-width:75%;
  padding:12px 14px;
  margin:6px 0;
  border-radius:16px;
  font-size:16px;
  animation:fadeIn 0.2s ease;
}

.user {
  background:#2c2c2e;
  margin-left:auto;
}

.ai {
  background:#1db954;
  color:black;
}

/* INPUT BAR */
.chat-input-bar {
  display:flex;
  padding:10px;
  border-top:1px solid rgba(255,255,255,0.05);
  background:#0b0b0c;
}

.chat-input {
  flex:1;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:20px;
  background:#1c1c1e;
  color:white;
}

.send-btn {
  margin-left:8px;
  padding:0 16px;
  border:none;
  border-radius:20px;
  background:#1db954;
}

/* TYPING DOTS */
.typing {
  display:flex;
  gap:4px;
  padding:10px;
}

.dot {
  width:6px;
  height:6px;
  background:#aaa;
  border-radius:50%;
  animation:blink 1.4s infinite;
}

.dot:nth-child(2){animation-delay:0.2s}
.dot:nth-child(3){animation-delay:0.4s}

@keyframes blink {
  0%,80%,100%{opacity:0}
  40%{opacity:1}
}

@keyframes fadeIn {
  from {opacity:0; transform:translateY(5px);}
  to {opacity:1; transform:translateY(0);}
}

</style>
</head>

<body>

<div class="app">

<header>📊 Trading AI</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">Trading</div>
  <div class="tab" onclick="switchTab(1)">AI Chat</div>
  <div class="indicator" id="indicator"></div>
</div>

<div class="wrapper" id="wrapper">

<!-- TRADE -->
<div class="section">
  <div class="trade-box">

    <input id="tradeInput" class="trade-input" placeholder="TSLA 1.5">

    <button class="btn buy" onclick="haptic(); sendTrade('buy '+val('tradeInput'))">BUY</button>
    <button class="btn sell" onclick="haptic(); sendTrade('sell '+val('tradeInput'))">SELL</button>
    <button class="btn cmd" onclick="haptic(); sendTrade('list')">📊 PORTFOLIO</button>

  </div>
</div>

<!-- CHAT -->
<div class="section">

  <div class="chat-container">

    <div id="chatBox" class="chat-box"></div>

    <div id="typing" style="display:none" class="typing">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <div class="chat-input-bar">
      <input id="chatInput" class="chat-input" placeholder="Ask AI...">
      <button class="send-btn" onclick="sendAI()">Send</button>
    </div>

  </div>

</div>

</div>

</div>

<script>

const AI_IN="ai-chat";
const AI_OUT="ai-responses";
const TRADE="agent-commands";

let wrapper=document.getElementById("wrapper")
let indicator=document.getElementById("indicator")
let current=0

function switchTab(i){
  current=i
  wrapper.style.transform=`translateX(-${i*50}%)`
  indicator.style.transform=`translateX(${i*100}%)`
}

/* SWIPE */
let startX=0

wrapper.addEventListener("touchstart",e=>{
  startX=e.touches[0].clientX
})

wrapper.addEventListener("touchend",e=>{
  let dx=e.changedTouches[0].clientX-startX

  if(dx>50 && current>0) switchTab(current-1)
  if(dx<-50 && current<1) switchTab(current+1)
})

/* HAPTIC */
function haptic(){
  if(navigator.vibrate) navigator.vibrate(10)
}

function val(id){ return document.getElementById(id).value }

/* TRADE */
function sendTrade(msg){
  fetch("https://ntfy.sh/"+TRADE,{method:"POST",body:msg})
  document.getElementById("tradeInput").value=""
}

/* CHAT */
function sendAI(){
  let msg=val("chatInput")
  if(!msg) return

  addMsg(msg,"user")
  document.getElementById("typing").style.display="flex"

  fetch("https://ntfy.sh/"+AI_IN,{method:"POST",body:msg})

  document.getElementById("chatInput").value=""
}

function addMsg(text,type){
  let box=document.getElementById("chatBox")
  let div=document.createElement("div")
  div.className="msg "+type
  div.innerText=text
  box.appendChild(div)
  box.scrollTop=box.scrollHeight
}

/* LISTEN AI */
let es=new EventSource("https://ntfy.sh/"+AI_OUT+"/sse")

es.onmessage=(e)=>{
  try{
    let data=JSON.parse(e.data)
    if(data.message){
      document.getElementById("typing").style.display="none"
      addMsg(data.message,"ai")
    }
  }catch{}
}

</script>

</body>
</html>
