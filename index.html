<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Trading AI</title>

<style>

/* ===== BASE ===== */
body {
  margin:0;
  background:#0d0d0d;
  color:white;
  font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

/* SAFE AREA (IPHONE) */
.container {
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ===== HEADER ===== */
header {
  text-align:center;
  padding:16px;
  font-size:18px;
  font-weight:600;
  border-bottom:1px solid #222;
}

/* ===== TABS ===== */
.tabs {
  display:flex;
}

.tab {
  flex:1;
  padding:14px;
  text-align:center;
  font-size:15px;
  background:#111;
  border-bottom:2px solid transparent;
}

.tab.active {
  border-bottom:2px solid #1db954;
  color:#1db954;
}

/* ===== SECTIONS ===== */
.section {
  display:none;
  height:calc(100vh - 110px);
}

.section.active {
  display:flex;
  flex-direction:column;
}

/* ===================== */
/* ===== TRADE UI ===== */
/* ===================== */

.trade-box {
  padding:20px;
}

.trade-input {
  width:100%;
  padding:18px;
  font-size:18px;
  border-radius:14px;
  border:none;
  background:#1a1a1a;
  color:white;
  margin-bottom:15px;
}

/* BIG BUTTONS */
.btn {
  width:100%;
  padding:18px;
  font-size:18px;
  border:none;
  border-radius:14px;
  margin:8px 0;
  font-weight:600;
}

.buy { background:#1db954; color:black; }
.sell { background:#ff3b30; }
.cmd { background:#2a2a2a; }

/* ===================== */
/* ===== CHAT UI ===== */
/* ===================== */

.chat-container {
  display:flex;
  flex-direction:column;
  height:100%;
}

/* MESSAGES */
.chat-box {
  flex:1;
  overflow-y:auto;
  padding:12px;
}

/* MESSAGE STYLE */
.msg {
  max-width:75%;
  padding:12px 14px;
  margin:6px 0;
  border-radius:16px;
  font-size:16px;
  line-height:1.4;
  word-wrap:break-word;
}

.user {
  background:#2a2a2a;
  margin-left:auto;
  text-align:right;
}

.ai {
  background:#1db954;
  color:black;
}

/* INPUT BAR (LIKE INSTAGRAM) */
.chat-input-bar {
  display:flex;
  padding:10px;
  border-top:1px solid #222;
  background:#0d0d0d;
}

.chat-input {
  flex:1;
  padding:14px;
  border-radius:20px;
  border:none;
  background:#1a1a1a;
  color:white;
  font-size:16px;
}

.send-btn {
  margin-left:10px;
  padding:0 18px;
  border:none;
  border-radius:20px;
  background:#1db954;
  font-weight:600;
}

</style>
</head>

<body class="container">

<header>📊 Trading AI</header>

<div class="tabs">
  <div class="tab active" onclick="show('trade',event)">Trading</div>
  <div class="tab" onclick="show('chat',event)">AI Chat</div>
</div>

<!-- ================= TRADE ================= -->
<div id="trade" class="section active">
  <div class="trade-box">

    <input id="tradeInput" class="trade-input" placeholder="Ex: TSLA 1.5">

    <button class="btn buy" onclick="sendTrade('buy '+val('tradeInput'))">BUY</button>
    <button class="btn sell" onclick="sendTrade('sell '+val('tradeInput'))">SELL</button>
    <button class="btn cmd" onclick="sendTrade('list')">📊 PORTFOLIO</button>

  </div>
</div>

<!-- ================= CHAT ================= -->
<div id="chat" class="section">

  <div class="chat-container">

    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input-bar">
      <input id="chatInput" class="chat-input" placeholder="Ask about stocks...">
      <button class="send-btn" onclick="sendAI()">Send</button>
    </div>

  </div>

</div>

<script>

const AI_IN="ai-chat";
const AI_OUT="ai-responses";
const TRADE="agent-commands";

/* ===== UI ===== */
function show(id,e){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))

  document.getElementById(id).classList.add('active')
  e.target.classList.add('active')
}

function val(id){
  return document.getElementById(id).value
}

/* ===== TRADE ===== */
function sendTrade(msg){
  if(!msg) return

  fetch("https://ntfy.sh/"+TRADE,{
    method:"POST",
    body:msg
  })

  document.getElementById("tradeInput").value=""
}

/* ===== CHAT ===== */
function sendAI(){
  let msg=val("chatInput")
  if(!msg) return

  addMsg(msg,"user")

  fetch("https://ntfy.sh/"+AI_IN,{
    method:"POST",
    body:msg
  })

  document.getElementById("chatInput").value=""
}

function addMsg(text,type){
  let box=document.getElementById("chatBox")

  let div=document.createElement("div")
  div.className="msg "+type
  div.innerText=text

  box.appendChild(div)
  box.scrollTop=box.scrollHeight
}

/* ===== LISTEN AI ===== */
let es=new EventSource("https://ntfy.sh/"+AI_OUT+"/sse")

es.onmessage=(e)=>{
  try{
    let data=JSON.parse(e.data)
    if(data.message){
      addMsg(data.message,"ai")
    }
  }catch{}
}

</script>

</body>
</html>
