<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trading AI</title>

<style>
body{margin:0;background:#0f0f0f;color:white;font-family:Arial}
header{padding:15px;text-align:center;background:#111}
.tabs{display:flex}
.tab{flex:1;padding:15px;text-align:center;background:#222;cursor:pointer}
.tab.active{background:#444}
.section{display:none;padding:15px}
.section.active{display:block}
input{width:100%;padding:15px;border-radius:10px;border:none;margin-bottom:10px}
button{width:100%;padding:15px;margin:5px 0;border:none;border-radius:10px}
.buy{background:#1db954}
.sell{background:#ff3b30}
.cmd{background:#333;color:white}
.chat{height:300px;overflow:auto;background:#1a1a1a;padding:10px;border-radius:10px}
.msg{margin:5px;padding:10px;border-radius:10px}
.user{background:#333;text-align:right}
.ai{background:#1db954;color:black}
</style>

</head>
<body>

<header>📊 Trading AI</header>

<div class="tabs">
<div class="tab active" onclick="show('trade',event)">Trading</div>
<div class="tab" onclick="show('chat',event)">AI Chat</div>
</div>

<div id="trade" class="section active">
<input id="tradeInput" placeholder="TSLA 1">
<button class="buy" onclick="sendTrade('buy '+val('tradeInput'))">BUY</button>
<button class="sell" onclick="sendTrade('sell '+val('tradeInput'))">SELL</button>
<button class="cmd" onclick="sendTrade('list')">LIST</button>
</div>

<div id="chat" class="section">
<div id="chatBox" class="chat"></div>
<input id="chatInput" placeholder="Ask AI...">
<button onclick="sendAI()">Send</button>
</div>

<script>

const AI_IN = "ai-chat";
const AI_OUT = "ai-responses";
const TRADE = "agent-commands";

function show(id,e){
document.querySelectorAll('.section').forEach(x=>x.classList.remove('active'))
document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'))
document.getElementById(id).classList.add('active')
e.target.classList.add('active')
}

function val(id){return document.getElementById(id).value}

function sendTrade(msg){
fetch("https://ntfy.sh/"+TRADE,{method:"POST",body:msg})
document.getElementById("tradeInput").value=""
}

function sendAI(){
let msg=val("chatInput")
if(!msg) return
add(msg,"user")
fetch("https://ntfy.sh/"+AI_IN,{method:"POST",body:msg})
document.getElementById("chatInput").value=""
}

function add(text,type){
let d=document.createElement("div")
d.className="msg "+type
d.innerText=text
chatBox.appendChild(d)
chatBox.scrollTop=chatBox.scrollHeight
}

let chatBox=document.getElementById("chatBox")

let es=new EventSource("https://ntfy.sh/"+AI_OUT+"/sse")

es.onmessage=(e)=>{
try{
let data=JSON.parse(e.data)
if(data.message)add(data.message,"ai")
}catch{}
}

</script>

</body>
</html>
