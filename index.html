<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Trading AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f0f;
  color:white;
}

/* HEADER */
header {
  text-align:center;
  padding:15px;
  background:#111;
  font-size:20px;
  font-weight:bold;
}

/* TABS */
.tabs {
  display:flex;
}

.tab {
  flex:1;
  padding:15px;
  text-align:center;
  background:#222;
  cursor:pointer;
}

.tab.active {
  background:#444;
}

/* CONTENT */
.section {
  display:none;
  padding:15px;
}

.section.active {
  display:block;
}

/* INPUT */
input {
  width:100%;
  padding:15px;
  font-size:16px;
  border:none;
  border-radius:10px;
  margin-bottom:10px;
}

/* BUTTONS */
button {
  width:100%;
  padding:15px;
  margin:5px 0;
  font-size:16px;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

.buy { background:#1db954; color:black; }
.sell { background:#ff3b30; color:white; }
.cmd { background:#333; color:white; }

/* CHAT */
.chat-box {
  height:300px;
  overflow-y:auto;
  background:#1a1a1a;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.msg {
  margin:5px 0;
  padding:10px;
  border-radius:10px;
}

.user { background:#333; text-align:right; }
.ai { background:#1db954; color:black; }

</style>
</head>

<body>

<header>📊 Trading AI Panel</header>

<div class="tabs">
  <div class="tab active" onclick="show('trade')">Trading</div>
  <div class="tab" onclick="show('chat')">AI Chat</div>
</div>

<!-- ================= TRADE ================= -->
<div id="trade" class="section active">

<input id="tradeInput" placeholder="TSLA 2.5 / list">

<button class="buy" onclick="sendTrade('buy ' + val('tradeInput'))">BUY</button>
<button class="sell" onclick="sendTrade('sell ' + val('tradeInput'))">SELL</button>

<button class="cmd" onclick="sendTrade(val('tradeInput'))">SEND</button>
<button class="cmd" onclick="sendTrade('list')">LIST</button>

</div>

<!-- ================= CHAT ================= -->
<div id="chat" class="section">

<div id="chatBox" class="chat-box"></div>

<input id="chatInput" placeholder="Ask about stocks...">

<button class="cmd" onclick="sendAI()">Send</button>
<button class="cmd" onclick="clearChat()">Clear Chat</button>

</div>

<script>
const TRADE_TOPIC = "agent-commands";
const AI_TOPIC = "ai-chat";
const OUTPUT_TOPIC = "investitii-agent";

/* ---------- UI ---------- */
function show(tab) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));

  document.getElementById(tab).classList.add('active');
  event.target.classList.add('active');
}

function val(id) {
  return document.getElementById(id).value;
}

function clear(id) {
  document.getElementById(id).value="";
}

/* ---------- TRADE ---------- */
function sendTrade(msg) {
  if (!msg) return;

  fetch("https://ntfy.sh/" + TRADE_TOPIC, {
    method:"POST",
    body:msg
  });

  clear("tradeInput");
}

/* ---------- CHAT ---------- */
function sendAI() {
  const msg = val("chatInput");
  if (!msg) return;

  addMsg(msg, "user");

  fetch("https://ntfy.sh/" + AI_TOPIC, {
    method:"POST",
    body:msg
  });

  clear("chatInput");
}

function addMsg(text, type) {
  const box = document.getElementById("chatBox");

  const div = document.createElement("div");
  div.className = "msg " + type;
  div.innerText = text;

  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function clearChat() {
  document.getElementById("chatBox").innerHTML = "";
}

/* ---------- LISTEN OUTPUT ---------- */
const evtSource = new EventSource("https://ntfy.sh/" + OUTPUT_TOPIC + "/sse");

evtSource.onmessage = function(e) {
  try {
    const data = JSON.parse(e.data);

    if (data.message) {
      addMsg(data.message, "ai");
    }
  } catch {}
};
</script>

</body>
</html>
