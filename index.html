<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Trading Panel</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      touch-action: manipulation;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
      outline: none;
    }

    button {
      width: 100%;
      padding: 18px;
      margin: 8px 0;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .buy { background: #1db954; color: black; }
    .sell { background: #ff3b30; color: white; }
    .cmd { background: #2c2c2c; color: white; }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

<h2>📊 Trading AI Panel</h2>

<input id="cmd" placeholder="TSLA 2.5 / list / help / clear">

<button class="buy"
        onclick="send('buy ' + document.getElementById('cmd').value)">
  BUY
</button>

<button class="sell"
        onclick="send('sell ' + document.getElementById('cmd').value)">
  SELL
</button>

<button class="cmd"
        onclick="send(document.getElementById('cmd').value)">
  SEND
</button>

<button class="cmd" onclick="send('list')">
  LIST
</button>

<button class="cmd" onclick="send('help')">
  HELP
</button>

<button class="cmd" onclick="send('clear')">
  CLEAR CHAT
</button>

<script>
const TOPIC = "agent-commands";

function send(msg) {
  if (!msg || msg.trim() === "") return;

  fetch("https://ntfy.sh/" + TOPIC, {
    method: "POST",
    body: msg
  });

  document.getElementById("cmd").value = "";
}
</script>

</body>
</html>
