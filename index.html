<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Trading + AI Dashboard</title>

<style>
body { font-family: Arial; background:#111; color:white; padding:20px; }

button, input {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  font-size: 16px;
}

.buy { background: green; color: white; }
.sell { background: red; color: white; }
.ai { background: purple; color: white; }
.cmd { background: #333; color: white; }

#chatBox {
  display: none;
  border: 1px solid #444;
  padding: 10px;
  height: 300px;
  overflow-y: auto;
  margin-top: 10px;
  background: #000;
}
</style>
</head>

<body>

<h2>📊 Trading + AI Panel</h2>

<!-- TRADING -->
<div id="tradePanel">
<input id="stock" placeholder="TSLA / AAPL / SOFI">

<button class="buy" onclick="sendTrade('buy ' + document.getElementById('stock').value)">
BUY
</button>

<button class="sell" onclick="sendTrade('sell ' + document.getElementById('stock').value)">
SELL
</button>

<button class="cmd" onclick="sendTrade('list')">LIST</button>
</div>

<hr>

<!-- AI CHAT -->
<button class="ai" onclick="toggleChat()">🤖 AI CHAT</button>

<div id="chatBox"></div>

<input id="chatInput" placeholder="Ask AI..." style="display:none">
<button class="ai" id="sendChatBtn" style="display:none" onclick="sendChat()">SEND AI</button>

<script>

const TRADE_TOPIC = "agent-commands";
const AI_TOPIC = "ai-chat";

function sendTrade(msg){
  fetch("https://ntfy.sh/" + TRADE_TOPIC, {method:"POST", body:msg});
  alert(msg);
}

function toggleChat(){
  document.getElementById("chatBox").style.display = "block";
  document.getElementById("chatInput").style.display = "block";
  document.getElementById("sendChatBtn").style.display = "block";
}

function sendChat(){
  let msg = document.getElementById("chatInput").value;
  fetch("https://ntfy.sh/" + AI_TOPIC, {method:"POST", body:msg});

  addChat("🧑 You: " + msg);
  document.getElementById("chatInput").value = "";
}

// fake UI history (local)
function addChat(text){
  let box = document.getElementById("chatBox");
  box.innerHTML += "<div>" + text + "</div>";
}

</script>

</body>
</html>
