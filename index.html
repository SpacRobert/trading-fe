<style>

/* ===== RESET ===== */
* {
  box-sizing: border-box;
}

html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden; /* 🚫 NO GLOBAL SCROLL */
  background:#0b0b0c;
  font-family:-apple-system, BlinkMacSystemFont;
}

/* ===== APP ===== */
.app {
  height:100dvh;
  width:100%;
  max-width:100vw;
  overflow:hidden;
  display:flex;
  flex-direction:column;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ===== HEADER ===== */
header {
  padding:14px;
  text-align:center;
  font-size:17px;
  font-weight:600;
  border-bottom:1px solid #1c1c1e;
}

/* ===== TABS ===== */
.tabs {
  display:flex;
  width:100%;
}

.tab {
  flex:1;
  padding:12px;
  text-align:center;
  color:#888;
}

.tab.active {
  color:#1db954;
  border-bottom:2px solid #1db954;
}

/* ===== SECTION ===== */
.section {
  display:none;
  flex:1;
  width:100%;
  overflow:hidden;
}

.section.active {
  display:flex;
  flex-direction:column;
}

/* ===================== */
/* ===== TRADE ===== */
/* ===================== */

.trade-box {
  padding:16px;
  width:100%;
}

.trade-input {
  width:100%;
  max-width:100%;
  padding:16px;
  font-size:16px;
  border-radius:14px;
  border:none;
  background:#1c1c1e;
  color:white;
  margin-bottom:12px;
}

/* FIX overflow */
.trade-box * {
  max-width:100%;
}

.btn {
  width:100%;
  padding:16px;
  font-size:17px;
  border:none;
  border-radius:14px;
  margin:8px 0;
  font-weight:600;
}

.buy { background:#1db954; color:black; }
.sell { background:#ff3b30; }
.cmd { background:#2c2c2e; }

/* ===================== */
/* ===== CHAT ===== */
/* ===================== */

.chat-container {
  display:flex;
  flex-direction:column;
  height:100%;
  width:100%;
}

/* CHAT BOX */
.chat-box {
  flex:1;
  overflow-y:auto;
  overflow-x:hidden; /* 🚫 NO SIDE SCROLL */
  padding:10px;
}

/* MESSAGE */
.msg {
  max-width:75%;
  word-wrap:break-word;
  padding:12px 14px;
  margin:6px 0;
  border-radius:16px;
  font-size:16px;
  line-height:1.4;
}

.user {
  background:#2c2c2e;
  margin-left:auto;
}

.ai {
  background:#1db954;
  color:black;
}

/* 🔥 INPUT FIXED BOTTOM */
.chat-input-bar {
  position:sticky;
  bottom:0;
  display:flex;
  padding:10px;
  border-top:1px solid #1c1c1e;
  background:#0b0b0c;
}

/* INPUT */
.chat-input {
  flex:1;
  min-width:0; /* 🔥 IMPORTANT FIX */
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:20px;
  background:#1c1c1e;
  color:white;
}

/* BUTTON */
.send-btn {
  margin-left:8px;
  padding:0 16px;
  border:none;
  border-radius:20px;
  background:#1db954;
  white-space:nowrap;
}

</style>
