<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Trading AI Panel</title>

<style>
body {
  font-family: Arial;
  background:#111;
  color:white;
  padding:15px;
  font-size:20px;
}

input {
  width:100%;
  padding:18px;
  font-size:20px;
  margin-bottom:10px;
}

button {
  width:100%;
  padding:18px;
  margin:8px 0;
  font-size:20px;
  border:none;
  border-radius:10px;
}

.buy {background:green;color:white;}
.sell {background:red;color:white;}
.cmd {background:#333;color:white;}
.ai {background:purple;color:white;}

#chat {
  display:none;
  background:#000;
  padding:10px;
  height:300px;
  overflow:auto;
  margin-top:10px;
}
</style>
</head>

<body>

<h2>📊 Trading + AI</h2>

<!-- TRADE -->
<input id="stock" placeholder="TSLA / AAPL / SOFI">

<button class="buy" onclick="sendTrade('buy ' + stock.value)">BUY</button>
<button class="sell" onclick="sendTrade('sell ' + stock.value)">SELL</button>
<button class="cmd" onclick="sendTrade('list')">LIST</button>

<hr>

<!-- AI -->
<button class="ai" onclick="openChat()">🤖 AI CHAT</button>

<div id="chat"></div>

<input id="msg" style="display:none" placeholder="Ask AI...">
<button class="ai" id="send" style="display:none" onclick="sendAI()">SEND</button>

<script>

const TRADE_TOPIC = "agent-commands";
const AI_TOPIC = "ai-chat";

function sendTrade(msg){
  fetch("https://ntfy.sh/"+TRADE_TOPIC,{method:"POST",body:msg});
}

function openChat(){
  document.getElementById("chat").style.display="block";
  document.getElementById("msg").style.display="block";
  document.getElementById("send").style.display="block";
}

function sendAI(){
  let m = document.getElementById("msg").value;
  fetch("https://ntfy.sh/"+AI_TOPIC,{method:"POST",body:m});

  add("🧑 "+m);
  document.getElementById("msg").value="";
}

function add(t){
  document.getElementById("chat").innerHTML += "<div>"+t+"</div>";
}

</script>

</body>
</html>
