<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<title>Trading AI</title>

<style>

/* ===== RESET ===== */
* {
  box-sizing: border-box;
}

html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  overflow:hidden; /* 🚫 NO SIDE SCROLL */
  background:#0b0b0c;
  font-family:-apple-system, BlinkMacSystemFont;
}

/* SAFE AREA */
.app {
  height:100dvh; /* 🔥 FIX iOS */
  display:flex;
  flex-direction:column;
  padding-top: env(safe-area-inset-top);
  padding-bottom: env(safe-area-inset-bottom);
}

/* ===== HEADER ===== */
header {
  padding:14px;
  text-align:center;
  font-size:17px;
  font-weight:600;
  border-bottom:1px solid #1c1c1e;
}

/* ===== TABS ===== */
.tabs {
  display:flex;
}

.tab {
  flex:1;
  padding:12px;
  text-align:center;
  color:#888;
}

.tab.active {
  color:#1db954;
  border-bottom:2px solid #1db954;
}

/* ===== SECTION ===== */
.section {
  display:none;
  flex:1;
  overflow:hidden;
}

.section.active {
  display:flex;
  flex-direction:column;
}

/* ===================== */
/* ===== TRADE ===== */
/* ===================== */

.trade-box {
  padding:16px;
}

.trade-input {
  width:100%;
  padding:16px;
  font-size:16px;
  border-radius:14px;
  border:none;
  background:#1c1c1e;
  color:white;
  margin-bottom:12px;
}

.btn {
  width:100%;
  padding:16px;
  font-size:17px;
  border:none;
  border-radius:14px;
  margin:8px 0;
  font-weight:600;
}

.buy { background:#1db954; color:black; }
.sell { background:#ff3b30; }
.cmd { background:#2c2c2e; }

/* ===================== */
/* ===== CHAT ===== */
/* ===================== */

.chat-container {
  display:flex;
  flex-direction:column;
  height:100%;
}

/* CHAT BOX */
.chat-box {
  flex:1;
  overflow-y:auto;
  padding:10px;
}

/* MESSAGE */
.msg {
  max-width:75%;
  padding:12px 14px;
  margin:6px 0;
  border-radius:16px;
  font-size:16px;
  line-height:1.4;
}

.user {
  background:#2c2c2e;
  margin-left:auto;
}

.ai {
  background:#1db954;
  color:black;
}

/* INPUT BAR */
.chat-input-bar {
  display:flex;
  padding:10px;
  border-top:1px solid #1c1c1e;
  background:#0b0b0c;
}

/* INPUT */
.chat-input {
  flex:1;
  padding:14px;
  font-size:16px; /* 🚫 NO ZOOM */
  border:none;
  border-radius:20px;
  background:#1c1c1e;
  color:white;
}

/* BUTTON */
.send-btn {
  margin-left:8px;
  padding:0 16px;
  border:none;
  border-radius:20px;
  background:#1db954;
}

</style>
</head>

<body>

<div class="app">

<header>📊 Trading AI</header>

<div class="tabs">
  <div class="tab active" onclick="show('trade',event)">Trading</div>
  <div class="tab" onclick="show('chat',event)">AI Chat</div>
</div>

<!-- ===== TRADE ===== -->
<div id="trade" class="section active">
  <div class="trade-box">

    <input id="tradeInput" class="trade-input" placeholder="TSLA 1.5">

    <button class="btn buy" onclick="sendTrade('buy '+val('tradeInput'))">BUY</button>
    <button class="btn sell" onclick="sendTrade('sell '+val('tradeInput'))">SELL</button>
    <button class="btn cmd" onclick="sendTrade('list')">📊 PORTFOLIO</button>

  </div>
</div>

<!-- ===== CHAT ===== -->
<div id="chat" class="section">

  <div class="chat-container">

    <div id="chatBox" class="chat-box"></div>

    <div class="chat-input-bar">
      <input id="chatInput" class="chat-input" placeholder="Ask AI...">
      <button class="send-btn" onclick="sendAI()">Send</button>
    </div>

  </div>

</div>

</div>

<script>

const AI_IN="ai-chat";
const AI_OUT="ai-responses";
const TRADE="agent-commands";

/* UI */
function show(id,e){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'))
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  document.getElementById(id).classList.add('active')
  e.target.classList.add('active')
}

function val(id){
  return document.getElementById(id).value
}

/* TRADE */
function sendTrade(msg){
  if(!msg) return
  fetch("https://ntfy.sh/"+TRADE,{method:"POST",body:msg})
  document.getElementById("tradeInput").value=""
}

/* CHAT */
function sendAI(){
  let msg=val("chatInput")
  if(!msg) return

  addMsg(msg,"user")

  fetch("https://ntfy.sh/"+AI_IN,{method:"POST",body:msg})

  document.getElementById("chatInput").value=""
}

function addMsg(text,type){
  let box=document.getElementById("chatBox")

  let div=document.createElement("div")
  div.className="msg "+type
  div.innerText=text

  box.appendChild(div)
  box.scrollTop=box.scrollHeight
}

/* LISTEN AI */
let es=new EventSource("https://ntfy.sh/"+AI_OUT+"/sse")

es.onmessage=(e)=>{
  try{
    let data=JSON.parse(e.data)
    if(data.message){
      addMsg(data.message,"ai")
    }
  }catch{}
}

</script>

</body>
</html>
