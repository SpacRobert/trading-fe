<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <title>Trading AI Panel</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    h2 {
      text-align: center;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 18px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      margin-bottom: 15px;
    }

    button {
      width: 100%;
      padding: 18px;
      margin: 8px 0;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
    }

    .buy { background: #1db954; color: black; }
    .sell { background: #ff3b30; color: white; }
    .cmd { background: #2c2c2c; color: white; }

    button:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body>

<h2>📊 Trading AI Panel</h2>

<input id="cmd" placeholder="TSLA 2.5 / list / help / ask AI">

<button class="buy" onclick="sendTrade('buy ' + val())">BUY</button>
<button class="sell" onclick="sendTrade('sell ' + val())">SELL</button>

<button class="cmd" onclick="sendTrade(val())">SEND</button>
<button class="cmd" onclick="sendTrade('list')">LIST</button>
<button class="cmd" onclick="sendTrade('help')">HELP</button>

<button class="cmd" onclick="sendAI()">🤖 AI CHAT</button>

<script>
const TRADE_TOPIC = "agent-commands";
const AI_TOPIC = "ai-chat";

function val() {
  return document.getElementById("cmd").value;
}

function clearInput() {
  document.getElementById("cmd").value = "";
}

function sendTrade(msg) {
  if (!msg || msg.trim() === "") return;

  fetch("https://ntfy.sh/" + TRADE_TOPIC, {
    method: "POST",
    body: msg
  });

  clearInput();
}

function sendAI() {
  const msg = val();

  if (!msg || msg.trim() === "") return;

  fetch("https://ntfy.sh/" + AI_TOPIC, {
    method: "POST",
    body: msg
  });

  clearInput();
}
</script>

</body>
</html>
